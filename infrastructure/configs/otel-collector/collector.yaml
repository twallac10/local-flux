apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: cluster
  namespace: observability
spec:
  mode: deployment
  replicas: 1
  serviceAccount: otel-collector
  config:
    receivers:
      prometheus:
        config:
          scrape_configs:
            # Flux controllers — no dedicated metrics services, use pod discovery on port 8080
            - job_name: flux-controllers
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names: [flux-system]
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_container_port_number]
                  action: keep
                  regex: "8080"
                - source_labels: [__meta_kubernetes_pod_label_app]
                  target_label: job
                - source_labels: [__meta_kubernetes_pod_ip]
                  target_label: __address__
                  replacement: $1:8080
            # Kyverno — admission controller metrics service is kyverno-svc-metrics
            - job_name: kyverno-admission-controller
              static_configs:
                - targets: ['kyverno-svc-metrics.policy.svc.cluster.local:8000']
            - job_name: kyverno-background-controller
              static_configs:
                - targets: ['kyverno-background-controller-metrics.policy.svc.cluster.local:8000']
            - job_name: kyverno-cleanup-controller
              static_configs:
                - targets: ['kyverno-cleanup-controller-metrics.policy.svc.cluster.local:8000']
            - job_name: kyverno-reports-controller
              static_configs:
                - targets: ['kyverno-reports-controller-metrics.policy.svc.cluster.local:8000']
            # Kyverno reports server — HTTPS only on port 4443
            - job_name: kyverno-reports-server
              scheme: https
              tls_config:
                insecure_skip_verify: true
              static_configs:
                - targets: ['kyverno-reports-server.policy.svc.cluster.local:443']
            - job_name: cert-manager
              static_configs:
                - targets: ['cert-manager.cert-manager.svc.cluster.local:9402']
            - job_name: kube-state-metrics
              static_configs:
                - targets: ['prometheus-stack-kube-state-metrics.observability.svc.cluster.local:8080']
            - job_name: node-exporter
              static_configs:
                - targets: ['prometheus-stack-prometheus-node-exporter.observability.svc.cluster.local:9100']
            - job_name: otel-operator
              static_configs:
                - targets: ['opentelemetry-operator.observability.svc.cluster.local:8080']
            - job_name: kubelet-cadvisor
              scheme: https
              tls_config:
                ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                insecure_skip_verify: true
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              kubernetes_sd_configs:
                - role: node
              relabel_configs:
                - action: labelmap
                  regex: __meta_kubernetes_node_label_(.+)
                - target_label: __address__
                  replacement: kubernetes.default.svc.cluster.local:443
                - source_labels: [__meta_kubernetes_node_name]
                  regex: (.+)
                  target_label: __metrics_path__
                  replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
    processors:
      batch: {}
      resource:
        attributes:
          - action: insert
            key: cluster
            value: local-flux
    exporters:
      prometheusremotewrite:
        endpoint: http://prometheus-operated.observability.svc.cluster.local:9090/api/v1/write
      debug:
        verbosity: basic
    service:
      pipelines:
        metrics:
          receivers: [prometheus]
          processors: [batch, resource]
          exporters: [prometheusremotewrite, debug]
