apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: otel-operator
  namespace: observability
spec:
  interval: 1m
  timeout: 5m
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
  chart:
    spec:
      chart: opentelemetry-operator
      version: ">=0.60.0"
      sourceRef:
        kind: HelmRepository
        name: open-telemetry
        namespace: observability
  values:
    manager:
      collectorImage:
        repository: otel/opentelemetry-collector-contrib
    admissionWebhooks:
      certManager:
        enabled: true
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
