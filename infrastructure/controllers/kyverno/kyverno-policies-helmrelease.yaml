apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno-policies
  namespace: policy
spec:
  interval: 1m
  timeout: 3m
  dependsOn:
    - name: kyverno
  chart:
    spec:
      chart: kyverno-policies
      version: ">=3.2.0 <4.0.0"
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: policy
  values:
    podSecurityStandard: baseline
    background: true
