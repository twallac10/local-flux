apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: policy
spec:
  interval: 1m
  timeout: 5m
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
  chart:
    spec:
      chart: kyverno
      version: ">=3.2.0 <4.0.0"
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: policy
  values:
    admissionController:
      replicas: 1
      metricsService:
        create: true
    backgroundController:
      metricsService:
        create: true
    cleanupController:
      metricsService:
        create: true
    reportsController:
      metricsService:
        create: true
    reportsServer:
      enabled: true
      metricsService:
        create: true
    features:
      policyExceptions:
        enabled: true
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
