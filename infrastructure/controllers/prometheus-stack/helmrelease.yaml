apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-stack
  namespace: observability
spec:
  interval: 1m
  timeout: 10m
  dependsOn:
    - name: otel-operator
  chart:
    spec:
      chart: kube-prometheus-stack
      version: ">=60.0.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: observability
  values:
    prometheus:
      prometheusSpec:
        enableRemoteWriteReceiver: true
        scrapeInterval: 30s
    kubeStateMetrics:
      enabled: true
    nodeExporter:
      enabled: true
    grafana:
      enabled: true
      adminPassword: admin
      sidecar:
        dashboards:
          enabled: true
          label: grafana_dashboard
          labelValue: "1"
          searchNamespace: ALL
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
