apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 1h
  url: https://fluxcd-community.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 1h
  releaseName: flux
  chart:
    spec:
      chart: flux2
      version: 2.5.1
      sourceRef:
        kind: HelmRepository
        name: flux-system
        namespace: flux-system
  values:
    imageAutomationController:
      create: false
    imageReflectionController:
      create: false
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
